<main class="clock-app" [style.--accent]="accentColor()">
  <div class="top-group">
    <h1>25 + 5 Clock</h1>
    <div class="settings">
      <app-clock-setting
        type="Break"
        label="Break Length"
        [length]="breakLength()"
        [disabled]="isRunning()"
        (decrement)="adjustLength('Break', false)"
        (increment)="adjustLength('Break', true)" />

      <app-clock-setting
        type="Session"
        label="Session Length"
        [length]="sessionLength()"
        [disabled]="isRunning()"
        (decrement)="adjustLength('Session', false)"
        (increment)="adjustLength('Session', true)" />
    </div>
  </div>

  <app-timer-display
    [label]="timerLabel()"
    [timeLeftInSeconds]="timeLeft()"
    [isRunning]="isRunning()" />

  <app-clock-controls
    [isRunning]="isRunning()"
    (startStop)="onStartStop()"
    (reset)="onReset()" />

  <audio #beepAudio id="beep" src="/beep.mp3" preload="auto"></audio>
</main>
